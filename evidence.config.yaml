appearance:
  default: system
  switcher: true



theme:
  colorPalettes:
    default:
      light:
        - "#2f5d7c" # slate blue
        - "#b5442e" # ember
        - "#4f7a5c" # forest
        - "#d9a441" # ochre
        - "#5a8a86" # dusty teal
        - "#7c6a8a" # muted plum
        - "#a8663f" # sienna
        - "#c98a5e" # sand
        - "#3f4d59" # deep slate
        - "#9a9089" # warm gray
      dark:
        - "#6fa3c4" # slate blue
        - "#e07a5f" # ember
        - "#7cae8c" # forest
        - "#e6bd6a" # ochre
        - "#7fb5b0" # dusty teal
        - "#a892b3" # muted plum
        - "#cf9268" # sienna
        - "#e0ad83" # sand
        - "#8ea3b0" # slate gray
        - "#b4aaa0" # warm gray
  colorScales:
    default:
      light:
        - "#f6ead6" # warm paper
        - "#a1341e" # deep ember
      dark:
        - "#3a271b" # charred
        - "#e9a05a" # bright ember
  colors:
    primary:
      light: "#2f5d7c"
      dark: "#7fb0cf"
    accent:
      light: "#b5442e"
      dark: "#e58a6a"
    base:
      light: "#ffffff" # white
      dark: "#09090b"
    info:
      light: "#2f6b8f"
      dark: "#6fb3d6"
    positive:
      light: "#4f7a5c"
      dark: "#8fc09a"
    warning:
      light: "#d9a441"
      dark: "#e9c46a"
    negative:
      light: "#b5442e"
      dark: "#e58a6a"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages.
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }
